<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Handwriting Recognizer</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="Handwriting recognition workspace">
        <header class="topbar">
          <div>
            <h1>Handwriting Recognizer</h1>
            <p class="model-note" id="model-note">Upload handwriting images and correct any result for retraining.</p>
          </div>
          <div class="server-pill" id="server-pill">checking</div>
        </header>

        <form class="upload-panel" id="upload-form" enctype="multipart/form-data">
          <label class="drop-zone" for="image-input">
            <span class="drop-title">Choose handwriting images</span>
            <span class="drop-copy">PNG, JPG, WEBP, HEIC, or HEIF. Multiple files are fine.</span>
            <input id="image-input" name="images" type="file" accept="image/png,image/jpeg,image/webp,image/heic,image/heif,.heic,.heif" multiple>
          </label>
          <button class="primary-button" type="submit">Recognize</button>
        </form>

        <section class="practice-panel" aria-label="Practice correction samples">
          <div class="practice-head">
            <div>
              <h2>Practice Corrections</h2>
              <p class="model-note">Draw one weak-label sample and save it for retraining.</p>
            </div>
            <div class="practice-target-card">
              <div class="practice-target" id="practice-target">0</div>
              <div class="practice-target-progress" id="practice-target-progress">0/20 saved</div>
            </div>
          </div>
          <div class="practice-labels" id="practice-labels" aria-label="Practice label choices"></div>
          <div class="practice-coverage" id="practice-coverage" aria-live="polite"></div>
          <div class="practice-readiness" id="practice-readiness" aria-live="polite"></div>
          <div class="practice-pad-wrap">
            <canvas id="practice-canvas" width="220" height="220" aria-label="Draw practice sample"></canvas>
          </div>
          <form class="practice-actions" id="practice-form">
            <input class="text-input" id="practice-label-input" name="corrected_label" type="text" maxlength="1" autocomplete="off" aria-label="Practice sample label">
            <button class="save-button" type="button" id="practice-clear">Clear</button>
            <button class="save-button" type="button" id="practice-next-needed">Next needed</button>
            <button class="primary-button" type="submit">Save sample</button>
            <span class="correction-status" id="practice-status" aria-live="polite"></span>
          </form>
        </section>

        <div class="status-line" id="status-line" role="status" aria-live="polite"></div>
        <section class="results" id="results" aria-label="Recognition results"></section>
      </section>
    </main>
  </body>
</html>
